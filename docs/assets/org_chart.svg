<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="860" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#8b949e" font-size="12" letter-spacing="2">ORGANIZATIONAL HIERARCHY</text>

  <!-- CEO -->
  <rect x="320" y="50" width="220" height="64" rx="8" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="430" y="77" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="700">CEO</text>
  <text x="430" y="97" text-anchor="middle" fill="#8b949e" font-size="11">Strategy · Final Approval · Rejection Gate</text>

  <!-- Vertical line from CEO -->
  <line x1="430" y1="114" x2="430" y2="145" stroke="#30363d" stroke-width="1.5"/>
  <!-- Horizontal split -->
  <line x1="200" y1="145" x2="660" y2="145" stroke="#30363d" stroke-width="1.5"/>

  <!-- Left branch: CTO line -->
  <line x1="200" y1="145" x2="200" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <!-- Middle branch: PM line -->
  <line x1="430" y1="145" x2="430" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <!-- Right branch: Researcher/DA line -->
  <line x1="660" y1="145" x2="660" y2="170" stroke="#30363d" stroke-width="1.5"/>

  <!-- CTO -->
  <rect x="80" y="170" width="240" height="58" rx="8" fill="#2ea043" opacity="0.12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="200" y="196" text-anchor="middle" fill="#56d364" font-size="13" font-weight="700">CTO</text>
  <text x="200" y="214" text-anchor="middle" fill="#8b949e" font-size="10">Architecture · Tech Delegation</text>

  <!-- PM -->
  <rect x="310" y="170" width="240" height="58" rx="8" fill="#2ea043" opacity="0.12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="430" y="196" text-anchor="middle" fill="#56d364" font-size="13" font-weight="700">Product Manager</text>
  <text x="430" y="214" text-anchor="middle" fill="#8b949e" font-size="10">User Stories · Sprint · Backlog</text>

  <!-- Researcher -->
  <rect x="540" y="170" width="240" height="58" rx="8" fill="#2ea043" opacity="0.12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="660" y="196" text-anchor="middle" fill="#56d364" font-size="13" font-weight="700">Researcher</text>
  <text x="660" y="214" text-anchor="middle" fill="#8b949e" font-size="10">Web Research · Credibility Scoring</text>

  <!-- CTO vertical + horizontal -->
  <line x1="200" y1="228" x2="200" y2="258" stroke="#30363d" stroke-width="1.5"/>
  <line x1="55" y1="258" x2="345" y2="258" stroke="#30363d" stroke-width="1.5"/>

  <!-- CTO children lines -->
  <line x1="55" y1="258" x2="55" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <line x1="145" y1="258" x2="145" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <line x1="255" y1="258" x2="255" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <line x1="345" y1="258" x2="345" y2="280" stroke="#30363d" stroke-width="1.5"/>

  <!-- Developer -->
  <rect x="10" y="280" width="90" height="56" rx="6" fill="#f78166" opacity="0.12" stroke="#f78166" stroke-width="1.5"/>
  <text x="55" y="303" text-anchor="middle" fill="#ffa198" font-size="11" font-weight="700">Developer</text>
  <text x="55" y="319" text-anchor="middle" fill="#8b949e" font-size="9">ToT · ReAct</text>
  <text x="55" y="330" text-anchor="middle" fill="#8b949e" font-size="9">Code Gen</text>

  <!-- QA -->
  <rect x="108" y="280" width="74" height="56" rx="6" fill="#f78166" opacity="0.12" stroke="#f78166" stroke-width="1.5"/>
  <text x="145" y="303" text-anchor="middle" fill="#ffa198" font-size="11" font-weight="700">QA</text>
  <text x="145" y="319" text-anchor="middle" fill="#8b949e" font-size="9">Tests</text>
  <text x="145" y="330" text-anchor="middle" fill="#8b949e" font-size="9">Coverage</text>

  <!-- Security -->
  <rect x="190" y="280" width="130" height="56" rx="6" fill="#f78166" opacity="0.12" stroke="#f78166" stroke-width="1.5"/>
  <text x="255" y="303" text-anchor="middle" fill="#ffa198" font-size="11" font-weight="700">Security Eng.</text>
  <text x="255" y="319" text-anchor="middle" fill="#8b949e" font-size="9">Audit · CVSS</text>
  <text x="255" y="330" text-anchor="middle" fill="#8b949e" font-size="9">Hardening</text>

  <!-- DevOps -->
  <rect x="298" y="280" width="96" height="56" rx="6" fill="#f78166" opacity="0.12" stroke="#f78166" stroke-width="1.5"/>
  <text x="346" y="303" text-anchor="middle" fill="#ffa198" font-size="11" font-weight="700">DevOps</text>
  <text x="346" y="319" text-anchor="middle" fill="#8b949e" font-size="9">Docker</text>
  <text x="346" y="330" text-anchor="middle" fill="#8b949e" font-size="9">CI/CD</text>

  <!-- PM vertical + children -->
  <line x1="430" y1="228" x2="430" y2="258" stroke="#30363d" stroke-width="1.5"/>
  <!-- Data Analyst under PM -->
  <rect x="382" y="280" width="150" height="56" rx="6" fill="#d2a8ff" opacity="0.12" stroke="#d2a8ff" stroke-width="1.5"/>
  <line x1="430" y1="258" x2="430" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <text x="457" y="303" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="700">Data Analyst</text>
  <text x="457" y="319" text-anchor="middle" fill="#8b949e" font-size="9">Metrics · Cost</text>
  <text x="457" y="330" text-anchor="middle" fill="#8b949e" font-size="9">Reports</text>

  <!-- Collaboration layer -->
  <rect x="80" y="358" width="700" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="430" y="376" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">COLLABORATION LAYER  ·  shared by all agents</text>
  <text x="430" y="393" text-anchor="middle" fill="#8b949e" font-size="10">DebateOrchestrator  ·  AgentMeeting  ·  CriticEnsemble  ·  MoAggregator  ·  MessageBus</text>
</svg>
